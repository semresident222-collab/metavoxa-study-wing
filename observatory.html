<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Observatory — MetaVoxa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050914;
    --text: #f0ead8;
    --text-secondary: rgba(255,255,255,0.4);
    --gold: rgba(210,175,100,1);
    --gold-dim: rgba(210,175,100,0.5);
    --gold-faint: rgba(210,175,100,0.15);
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --card-hover: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ========== TELESCOPE OPENING ========== */
  #telescope-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.2s ease, visibility 1.2s ease;
  }

  #telescope-overlay.done {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #telescope-lens {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(210,175,100,0.4) 0%, rgba(5,9,20,0.8) 50%, #000 100%);
    filter: blur(25px);
    animation: telescope-focus 3.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes telescope-focus {
    0% {
      width: 80px;
      height: 80px;
      filter: blur(25px);
      opacity: 0.4;
    }
    25% {
      width: 250px;
      height: 250px;
      filter: blur(18px);
      opacity: 0.6;
    }
    50% {
      width: 600px;
      height: 600px;
      filter: blur(10px);
      opacity: 0.8;
    }
    75% {
      width: 1200px;
      height: 1200px;
      filter: blur(3px);
      opacity: 0.9;
    }
    100% {
      width: 300vmax;
      height: 300vmax;
      filter: blur(0px);
      opacity: 0;
    }
  }

  /* ========== SKY SECTION ========== */
  #sky-section {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px;
  }

  #star-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .sky-content {
    position: relative;
    z-index: 1;
    pointer-events: none;
  }

  .sky-content > * {
    pointer-events: auto;
  }

  #sky-title {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1s ease, transform 1s ease;
  }

  #sky-title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #sky-tagline {
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    font-weight: 300;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
  }

  #sky-tagline.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #meta-ghost {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(2rem, 8vw, 5rem);
    letter-spacing: 0.5em;
    color: rgba(255,255,255,0.03);
    text-transform: uppercase;
    font-weight: 200;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  /* ========== SEARCH ========== */
  #search-container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 20px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
  }

  #search-container.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #search-input {
    width: 100%;
    padding: 14px 20px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--card-border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  #search-input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  #search-input:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 20px rgba(210,175,100,0.1);
  }

  #search-hints {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    margin-top: 8px;
    background: rgba(5,9,20,0.98);
    border: 0.5px solid var(--card-border);
    border-radius: 8px;
    overflow: hidden;
    display: none;
    z-index: 50;
  }

  #search-hints.active {
    display: block;
  }

  .search-hint {
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 0.9rem;
    color: var(--text-secondary);
    border-bottom: 0.5px solid var(--card-border);
  }

  .search-hint:last-child { border-bottom: none; }
  .search-hint:hover { background: rgba(210,175,100,0.08); color: var(--text); }
  .search-hint strong { color: var(--gold); font-weight: 400; }

  /* ========== FAST PATH BANNER ========== */
  #fast-path {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 10px;
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1s ease 0.9s, transform 1s ease 0.9s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  #fast-path.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #fast-path.dismissed { display: none !important; }

  #fast-path-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    transition: color 0.2s;
  }

  #fast-path-close:hover { color: var(--text); }

  /* ========== CARDS SECTION ========== */
  #cards-section {
    padding: 40px 24px 100px;
    max-width: 1200px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease 1.2s, transform 1s ease 1.2s;
  }

  #cards-section.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }

  @media (max-width: 640px) {
    #cards-grid {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      gap: 12px;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    #cards-grid::-webkit-scrollbar { display: none; }
  }

  .wing-card {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  @media (max-width: 640px) {
    .wing-card {
      min-width: 280px;
      flex-shrink: 0;
      scroll-snap-align: start;
    }
  }

  .wing-card:hover {
    border-color: rgba(255,255,255,0.15);
    background: var(--card-hover);
    transform: translateY(-2px);
  }

  .wing-card.active {
    border-color: var(--gold-dim);
    background: rgba(210,175,100,0.06);
  }

  .wing-card.sealed {
    opacity: 0.6;
  }

  .wing-card.sealed:hover {
    opacity: 0.8;
  }

  .wing-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .wing-number {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .wing-status {
    font-size: 0.65rem;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .wing-status.open {
    background: rgba(210,175,100,0.15);
    color: var(--gold);
    border: 0.5px solid var(--gold-faint);
  }

  .wing-status.here {
    background: rgba(210,175,100,0.2);
    color: var(--gold);
    border: 0.5px solid var(--gold-dim);
  }

  .wing-status.sealed {
    background: rgba(255,255,255,0.05);
    color: var(--text-secondary);
    border: 0.5px solid var(--card-border);
  }

  .wing-name {
    font-size: 1.3rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .wing-desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .wing-rooms {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .room-tag {
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .wing-actions {
    display: flex;
    gap: 10px;
  }

  .wing-btn {
    flex: 1;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    background: transparent;
    border: 0.5px solid var(--card-border);
    color: var(--text-secondary);
  }

  .wing-btn.primary {
    border: 0.5px solid var(--gold-dim);
    color: var(--gold);
  }

  .wing-btn.primary:hover {
    background: rgba(210,175,100,0.1);
    border-color: var(--gold);
  }

  .wing-btn.secondary:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
  }

  .wing-btn:disabled, .wing-btn.disabled {
    opacity: 0.4;
    cursor: default;
    pointer-events: none;
  }

  /* ========== DEEP DIVE PANEL ========== */
  #panel-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  #panel-placeholder {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .deep-dive-panel {
    background: var(--card-bg);
    border: 0.5px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    animation: panel-slide 0.5s ease;
  }

  @keyframes panel-slide {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 0.5px solid var(--card-border);
  }

  .panel-title {
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: 0.08em;
  }

  .panel-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
  }

  .panel-close:hover { color: var(--text); }

  .panel-body {
    padding: 0;
  }

  .panel-row {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 20px;
    padding: 20px 24px;
    border-bottom: 0.5px solid var(--card-border);
  }

  @media (max-width: 640px) {
    .panel-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }
  }

  .panel-row:last-child { border-bottom: none; }

  .panel-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 500;
    padding-top: 2px;
  }

  .panel-text {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.7;
    font-weight: 300;
  }

  .panel-footer {
    padding: 20px 24px;
    border-top: 0.5px solid var(--card-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .panel-link {
    color: var(--gold);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }

  .panel-link:hover { opacity: 0.8; }

  .panel-link.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  .panel-note {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-style: italic;
  }

  /* ========== NAVIGATION KEY ========== */
  #nav-key {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(5,9,20,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--card-border);
    z-index: 100;
    padding: 12px 16px;
    transform: translateY(0);
    transition: transform 0.3s ease;
  }

  #nav-key.hidden { transform: translateY(100%); }

  #key-toggle {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(5,9,20,0.95);
    border: 0.5px solid var(--card-border);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 8px 20px;
    color: var(--gold);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .key-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    max-width: 600px;
    margin: 0 auto;
  }

  @media (max-width: 480px) {
    .key-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .key-item {
    text-align: center;
    padding: 8px 4px;
    border-radius: 6px;
    transition: background 0.2s;
    text-decoration: none;
    display: block;
  }

  .key-item:hover { background: rgba(255,255,255,0.05); }

  .key-icon {
    font-size: 1.2rem;
    margin-bottom: 4px;
    display: block;
  }

  .key-label {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: block;
  }

  .key-item.active .key-label { color: var(--gold); }

  /* ========== UTILITIES ========== */
  .hidden { display: none !important; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>

<body>

<!-- TELESCOPE OPENING -->
<div id="telescope-overlay">
  <div id="telescope-lens"></div>
</div>

<!-- SKY SECTION -->
<section id="sky-section">
  <canvas id="star-canvas"></canvas>
  <div id="meta-ghost">M E T A V O X A</div>

  <div class="sky-content">
    <h1 id="sky-title">The Observatory</h1>
    <p id="sky-tagline">Where distance creates clarity</p>
  </div>

  <div id="search-container">
    <input type="text" id="search-input" placeholder="Search — try 'salon', 'essays', 'how does this work'..." autocomplete="off">

  </div>

  <div id="fast-path">
    <span>Already know what you want? Use the key below ↓ or search above ↑</span>
    <button id="fast-path-close">✕</button>
  </div>
</section>

<!-- CARDS SECTION -->
<section id="cards-section">
  <div id="cards-grid"></div>
</section>

<!-- PANEL CONTAINER -->
<div id="panel-container">
  <div id="panel-placeholder">← click any wing card to read its briefing</div>
  <div id="panel-content" class="hidden"></div>
</div>

<!-- NAVIGATION KEY -->
<nav id="nav-key">
  <button id="key-toggle">Navigate</button>
  <div class="key-grid">
    <a href="index.html" class="key-item"><span class="key-icon">🏛</span><span class="key-label">Lobby</span></a>
    <a href="atrium.html" class="key-item"><span class="key-icon">🌿</span><span class="key-label">Atrium</span></a>
    <a href="study-wing.html" class="key-item"><span class="key-icon">🧠</span><span class="key-label">Study</span></a>
    <a href="reading-room.html" class="key-item"><span class="key-icon">📚</span><span class="key-label">Reading</span></a>
    <a href="pattern-thoughts.html" class="key-item"><span class="key-icon">🌀</span><span class="key-label">Patterns</span></a>
    <a href="star-of-the-month.html" class="key-item"><span class="key-icon">⭐</span><span class="key-label">Star</span></a>
    <a href="salon.html" class="key-item"><span class="key-icon">✍️</span><span class="key-label">Salon</span></a>

  </div>
</nav>

<script>
// ========== SPACE HUM (Web Audio API) ==========
let audioCtx;
let humNodes = [];

function startSpaceHum() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const freqs = [55, 110, 165, 220];
    const targetGains = [0.03, 0.02, 0.015, 0.01];

    freqs.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = 'sine';
      osc.frequency.value = freq;

      filter.type = 'lowpass';
      filter.frequency.value = 300;
      filter.Q.value = 1;

      gain.gain.value = 0;

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      humNodes.push({ osc, gain, filter, freq });
    });

    // Fade in
    setTimeout(() => {
      humNodes.forEach((node, i) => {
        node.gain.gain.linearRampToValueAtTime(targetGains[i], audioCtx.currentTime + 3);
      });
    }, 100);

    // Subtle modulation
    setInterval(() => {
      humNodes.forEach((node) => {
        const drift = (Math.random() - 0.5) * 1.5;
        node.osc.frequency.linearRampToValueAtTime(
          node.freq + drift, 
          audioCtx.currentTime + 4
        );
      });
    }, 4000);

  } catch(e) {
    console.log('Audio not supported');
  }
}

let humStarted = false;
function initAudio() {
  if (!humStarted && audioCtx) {
    audioCtx.resume();
    humStarted = true;
  }
}
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

// Start hum immediately (will be silent until user interacts, then fade in)
startSpaceHum();

// ========== STAR CANVAS ==========
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let width, height;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  width = canvas.offsetWidth;
  height = canvas.offsetHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', () => {
  resizeCanvas();
  generateStars();
});

function generateStars() {
  stars = [];
  const count = Math.max(200, Math.floor((width * height) / 3000));

  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      size: Math.random() * 1.8 + 0.2,
      opacity: Math.random() * 0.5 + 0.15,
      twinkleSpeed: Math.random() * 0.015 + 0.003,
      twinkleOffset: Math.random() * Math.PI * 2
    });
  }
}
generateStars();

// Constellation nodes (MV shape) — responsive positions
function getNodePositions() {
  return [
    { id: 'study', name: 'Study Wing', x: width * 0.12, y: height * 0.62, size: 4, brightness: 0.9, status: 'open' },
    { id: 'reading', name: 'Reading Room', x: width * 0.28, y: height * 0.32, size: 3.5, brightness: 0.85, status: 'open' },
    { id: 'salon', name: 'Salon', x: width * 0.52, y: height * 0.28, size: 4, brightness: 0.9, status: 'open' },
    { id: 'patterns', name: 'Pattern Thoughts', x: width * 0.72, y: height * 0.58, size: 3.5, brightness: 0.8, status: 'open' },
    { id: 'glam', name: 'Glam Wing', x: width * 0.38, y: height * 0.18, size: 3, brightness: 0.5, status: 'sealed' },
    { id: 'observatory', name: 'Observatory', x: width * 0.45, y: height * 0.78, size: 6, brightness: 1, status: 'here' },
    { id: 'wingv', name: 'Wing V', x: width * 0.82, y: height * 0.22, size: 3, brightness: 0.5, status: 'sealed' }
  ];
}

const connections = [
  ['study', 'reading'], ['reading', 'salon'], ['salon', 'patterns'],
  ['glam', 'reading'], ['reading', 'observatory'], ['observatory', 'patterns'], ['patterns', 'wingv']
];

let time = 0;
let canvasReady = false;

function drawStars() {
  ctx.clearRect(0, 0, width, height);

  // Background
  const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
  grad.addColorStop(0, '#0a1025');
  grad.addColorStop(1, '#050914');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);

  // Background stars
  stars.forEach(star => {
    const twinkle = Math.sin(time * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${star.opacity * twinkle})`;
    ctx.fill();
  });

  const nodes = getNodePositions();

  // Draw constellation lines
  ctx.strokeStyle = 'rgba(210,175,100,0.25)';
  ctx.lineWidth = 0.8;
  connections.forEach(([a, b]) => {
    const nodeA = nodes.find(w => w.id === a);
    const nodeB = nodes.find(w => w.id === b);
    if (nodeA && nodeB) {
      ctx.beginPath();
      ctx.moveTo(nodeA.x, nodeA.y);
      ctx.lineTo(nodeB.x, nodeB.y);
      ctx.stroke();
    }
  });

  // Draw constellation nodes
  nodes.forEach(node => {
    const pulse = node.status === 'here' ? Math.sin(time * 0.025) * 0.25 + 0.75 : 1;

    // Glow
    const glowSize = node.size * (node.status === 'here' ? 10 : 5);
    const glowGrad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, glowSize);
    glowGrad.addColorStop(0, `rgba(210,175,100,${0.25 * node.brightness * pulse})`);
    glowGrad.addColorStop(0.5, `rgba(210,175,100,${0.08 * node.brightness * pulse})`);
    glowGrad.addColorStop(1, 'rgba(210,175,100,0)');
    ctx.beginPath();
    ctx.arc(node.x, node.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Ring
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.size * 2.5, 0, Math.PI * 2);
    ctx.strokeStyle = node.status === 'sealed' 
      ? `rgba(210,175,100,${0.25 * node.brightness})`
      : `rgba(210,175,100,${0.7 * node.brightness})`;
    ctx.lineWidth = node.status === 'sealed' ? 0.6 : 1.2;
    if (node.status === 'sealed') {
      ctx.setLineDash([4, 4]);
    } else {
      ctx.setLineDash([]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Center dot
    ctx.beginPath();
    ctx.arc(node.x, node.y, node.size * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210,175,100,${node.brightness})`;
    ctx.fill();

    // Inner bright core for "here"
    if (node.status === 'here') {
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.size * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fill();
    }

    // Label
    ctx.font = `${window.innerWidth < 640 ? '10px' : '12px'} sans-serif`;
    ctx.fillStyle = `rgba(255,255,255,${node.status === 'here' ? 0.85 : 0.55})`;
    ctx.textAlign = 'center';
    const labelY = node.y + node.size * 3.5 + 14;
    ctx.fillText(node.name, node.x, labelY);

    if (node.status === 'here') {
      ctx.font = `${window.innerWidth < 640 ? '9px' : '10px'} sans-serif`;
      ctx.fillStyle = 'rgba(210,175,100,0.7)';
      ctx.fillText('you are here', node.x, labelY + 14);
    }
  });

  time++;
  requestAnimationFrame(drawStars);
}

const panelPlaceholder = document.getElementById('panel-placeholder');
const panelContent = document.getElementById('panel-content');
let activePanel = null;

function openPanel(wingId) {
  const wing = wings.find(w => w.id === wingId);
  if (!wing) return;

  document.querySelectorAll('.wing-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`.wing-card[data-id="${wingId}"]`).classList.add('active');

  const linkHtml = wing.status === 'here' 
    ? `<span class="panel-link disabled">You are here</span>`
    : wing.status === 'sealed'
    ? `<span class="panel-link disabled">Sealed — coming soon</span>`
    : `<a href="${wing.link}" class="panel-link">Enter the ${wing.name} →</a>`;

  panelContent.innerHTML = `
    <div class="deep-dive-panel">
      <div class="panel-header">
        <span class="panel-title">${wing.name} — Full Briefing</span>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body">
        <div class="panel-row">
          <div class="panel-label">What It Is</div>
          <div class="panel-text">${wing.briefing.what}</div>
        </div>
        <div class="panel-row">
          <div class="panel-label">How It Works</div>
          <div class="panel-text">${wing.briefing.how}</div>
        </div>

        </div>

      </div>
    </div>
  `;

  panelPlaceholder.classList.add('hidden');
  panelContent.classList.remove('hidden');
  activePanel = wingId;

  setTimeout(() => {
    panelContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function closePanel() {
  panelContent.classList.add('hidden');
  panelPlaceholder.classList.remove('hidden');
  document.querySelectorAll('.wing-card').forEach(c => c.classList.remove('active'));
  activePanel = null;
}

const searchInput = document.getElementById('search-input');
const searchHints = document.getElementById('search-hints');

const searchTerms = [
  { term: 'salon', label: 'Salon — real-time conversation room', action: () => { scrollToCard('salon'); openPanel('salon'); } },
  { term: 'study', label: 'Study Wing — essays and research', action: () => { scrollToCard('study'); openPanel('study'); } },
  { term: 'reading', label: 'Reading Room — categorized essays', action: () => { scrollToCard('study'); openPanel('study'); } },
  { term: 'essays', label: 'Essays — in the Study Wing', action: () => { scrollToCard('study'); openPanel('study'); } },
  { term: 'pattern', label: 'Pattern Thoughts — micro-essays', action: () => { scrollToCard('study'); openPanel('study'); } },
  { term: 'glam', label: 'Glam Wing — fashion archive (coming)', action: () => { scrollToCard('glam'); openPanel('glam'); } },
  { term: 'how does this work', label: 'How MetaVoxa works — Observatory briefing', action: () => { scrollToCard('observatory'); openPanel('observatory'); } },
  { term: 'map', label: 'System map — Observatory', action: () => { scrollToCard('observatory'); openPanel('observatory'); } },
  { term: 'observatory', label: 'Observatory — you are here', action: () => { scrollToCard('observatory'); openPanel('observatory'); } }
];

function scrollToCard(wingId) {
  const card = document.querySelector(`.wing-card[data-id="${wingId}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

searchInput.addEventListener('input', (e) => {
  const val = e.target.value.toLowerCase().trim();
  if (!val) {
    searchHints.classList.remove('active');
    return;
  }

  const matches = searchTerms.filter(s => s.term.includes(val) || val.includes(s.term) || s.label.toLowerCase().includes(val));

  if (matches.length > 0) {
    searchHints.innerHTML = matches.map(m => 
      `<div class="search-hint" data-term="${m.term}"><strong>${m.term}</strong> — ${m.label}</div>`
    ).join('');
    searchHints.classList.add('active');
  } else {
    searchHints.innerHTML = `<div class="search-hint">No matches — try "salon", "essays", "how does this work"</div>`;
    searchHints.classList.add('active');
  }
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = searchInput.value.toLowerCase().trim();
    const match = searchTerms.find(s => s.term.includes(val) || val.includes(s.term));
    if (match) {
      match.action();
      searchHints.classList.remove('active');
      searchInput.value = '';
    }
  }
});

searchHints.addEventListener('click', (e) => {
  const hint = e.target.closest('.search-hint');
  if (hint) {
    const term = hint.dataset.term;
    const match = searchTerms.find(s => s.term === term);
    if (match) {
      match.action();
      searchHints.classList.remove('active');
      searchInput.value = '';
    }
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('#search-container')) {
    searchHints.classList.remove('active');
  }
});

// ========== NAV KEY TOGGLE ==========
const navKey = document.getElementById('nav-key');
const keyToggle = document.getElementById('key-toggle');
let keyOpen = true;

keyToggle.addEventListener('click', () => {
  keyOpen = !keyOpen;
  navKey.classList.toggle('hidden', !keyOpen);
  keyToggle.textContent = keyOpen ? 'Navigate' : 'Open Key';
});

let lastScroll = 0;
window.addEventListener('scroll', () => {
  const currentScroll = window.scrollY;
  if (currentScroll > lastScroll && currentScroll > 200) {
    navKey.classList.add('hidden');
    keyOpen = false;
    keyToggle.textContent = 'Open Key';
  } else if (currentScroll < lastScroll) {
    navKey.classList.remove('hidden');
    keyOpen = true;
    keyToggle.textContent = 'Navigate';
  }
  lastScroll = currentScroll;
});
</script>
