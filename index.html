<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaVoxa | The Atrium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --gold: rgba(212, 175, 55, 0.6);
            --blue: rgba(100, 149, 237, 0.5);
            --warm: rgba(255, 140, 0, 0.4);
            --luminous: rgba(255, 255, 255, 0.3);
            --transition-slow: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Playfair Display', serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Initial Darkness */
        #atrium-container {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 4s ease-in-out;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Central Anchor */
        .center-mark {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .metavoxa-text {
            font-size: 2.5rem;
            letter-spacing: 0.5rem;
            font-weight: 300;
            opacity: 0.4;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: opacity 2s;
        }

        .instruction-line {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 2s;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Spatial Zones */
        .zone {
            position: absolute;
            z-index: 15;
            width: 300px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: var(--transition-slow);
        }

        /* Positioning */
        .study { left: 10%; top: 50%; transform: translateY(-50%); }
        .observatory { right: 10%; top: 50%; transform: translateY(-50%); }
        .salon { right: 20%; bottom: 10%; }
        .glam { left: 20%; bottom: 10%; }

        /* Visual Elements for Wings */
        .wing-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.2;
            transition: var(--transition-slow);
            margin-bottom: 20px;
        }

        .study .wing-icon { background: var(--gold); box-shadow: 0 0 40px var(--gold); }
        .observatory .wing-icon { background: var(--blue); box-shadow: 0 0 40px var(--blue); }
        .salon .wing-icon { background: var(--warm); box-shadow: 0 0 40px var(--warm); border-radius: 50% 50% 0 0; }
        .glam .wing-icon { background: var(--luminous); box-shadow: 0 0 40px var(--luminous); transform: rotate(45deg); }

        .zone-text { opacity: 0; transition: opacity 1s; pointer-events: none; }
        .poetic-line { font-style: italic; font-size: 1rem; margin-bottom: 5px; color: rgba(255,255,255,0.7); }
        .wing-name { font-size: 1.2rem; letter-spacing: 0.2rem; text-transform: uppercase; }

        /* Hover States */
        .zone:hover .wing-icon { opacity: 0.8; filter: blur(5px); transform: scale(1.1); }
        .zone:hover { cursor: pointer; }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: difference;
            transition: transform 0.2s;
        }

        /* Transitions */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            z-index: 200;
            pointer-events: none;
            transition: opacity 2s ease-in;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="transition-overlay" id="overlay"></div>

    <div id="atrium-container">
        <canvas id="neuralCanvas"></canvas>

        <div class="center-mark">
            <div class="metavoxa-text">MetaVoxa</div>
            <div class="instruction-line" id="intro-text">Begin where you are pulled.</div>
        </div>

        <div class="zone study" onclick="transitionTo('study-wing.html')">
            <div class="wing-icon"></div>
            <div class="zone-text">
                <div class="poetic-line">“Where patterns become visible”</div>
                <div class="wing-name">Study Wing</div>
            </div>
        </div>

        <div class="zone observatory" onclick="transitionTo('observatory.html')">
            <div class="wing-icon"></div>
            <div class="zone-text">
                <div class="poetic-line">“Where distance creates clarity”</div>
                <div class="wing-name">Observatory</div>
            </div>
        </div>

        <div class="zone salon" onclick="transitionTo('salon.html')">
            <div class="wing-icon"></div>
            <div class="zone-text">
                <div class="poetic-line">“Where the coven gathers”</div>
                <div class="wing-name">Salon</div>
            </div>
        </div>

        <div class="zone glam" onclick="transitionTo('glam-wing.html')">
            <div class="wing-icon"></div>
            <div class="zone-text">
                <div class="poetic-line">“Where dressing is a discipline”</div>
                <div class="wing-name">Glam Wing</div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('atrium-container');
        const introText = document.getElementById('intro-text');
        const cursor = document.getElementById('cursor');

        // 1. Initial Fade In
        window.onload = () => {
            setTimeout(() => {
                container.style.opacity = '1';
            }, 500);

            setTimeout(() => {
                introText.style.opacity = '1';
                setTimeout(() => { introText.style.opacity = '0'; }, 4000);
            }, 3000);
        };

        // 2. Custom Cursor Follow
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 3. Hover Interaction Sequence
        document.querySelectorAll('.zone').forEach(zone => {
            const poetic = zone.querySelector('.poetic-line');
            const name = zone.querySelector('.wing-name');
            const textGroup = zone.querySelector('.zone-text');

            zone.addEventListener('mouseenter', () => {
                textGroup.style.opacity = '1';
                poetic.style.opacity = '0';
                name.style.opacity = '0';
                
                // Sequence
                setTimeout(() => { poetic.style.opacity = '1'; }, 200);
                setTimeout(() => { name.style.opacity = '1'; }, 1200);
            });

            zone.addEventListener('mouseleave', () => {
                textGroup.style.opacity = '0';
            });
        });

        // 4. Neural Light Currents (Canvas)
        const canvas = document.getElementById('neuralCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.life = Math.random() * 100;
                this.opacity = 0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.1;
                if (this.life < 20) this.opacity -= 0.01;
                else if (this.opacity < 0.15) this.opacity += 0.005;

                if (this.life <= 0) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(200, 230, 255, ${this.opacity})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 20, this.y + 5); // Slight wisp shape
                ctx.stroke();
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 5. Immersive Transition
        function transitionTo(url) {
            const overlay = document.getElementById('overlay');
            container.style.transform = "scale(1.2)";
            container.style.filter = "blur(10px)";
            container.style.opacity = "0";
            overlay.style.opacity = "1";
            
            setTimeout(() => {
                window.location.href = url;
            }, 2000);
        }
    </script>
</body>
</html>
