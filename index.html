<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Wing | MetaVoxa Palace</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Cormorant+SC:wght@600&display=swap" rel="stylesheet">

<style>
:root {
    --burgundy: #2C0A0A;
    --gold: #D4AF37;
    --gold-dim: #8B7355;
    --stone: #3A3A3A;
    --teal-patina: #2F4F4F;
    --deep-navy: #0F1419;
    --cream: #F5F0E8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: linear-gradient(180deg,#050505 0%,#1a0a0a 40%,#0f0505 100%);
    color:var(--cream);
    font-family:'Cormorant Garamond',serif;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* atmosphere */
.atmosphere{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 50%, rgba(139,0,0,0.1), transparent 40%),
        radial-gradient(circle at 80% 50%, rgba(212,175,55,0.05), transparent 40%);
    pointer-events:none;
}

/* curtain */
#curtain{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    animation:curtainRise 2s ease-out 5s forwards;
}

.wing-title{
    font-family:'Cinzel',serif;
    font-size:clamp(2.5rem,8vw,5rem);
    color:var(--gold);
    letter-spacing:0.6em;
    opacity:0;
    animation:titleReveal 4s ease-out 0.5s forwards;
}

@keyframes titleReveal{
    0%{opacity:0;transform:translateY(30px);filter:blur(10px);}
    30%,70%{opacity:1;transform:translateY(0);filter:blur(0);}
    100%{opacity:0;transform:translateY(-30px);}
}

@keyframes curtainRise{
    to{transform:translateY(-100%);opacity:0;}
}

/* thought */
#thought-stage{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    opacity:0;
    animation:fadeIn 1s ease-out 6s forwards;
}

@keyframes fadeIn{to{opacity:1;}}

.cursor{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0;}}

/* doors */
#doors-container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    gap:5rem;
    opacity:0;
}

#doors-container.show{animation:fadeIn 2s forwards;}

.door-frame{
    width:260px;
    height:420px;
    position:relative;
    cursor:pointer;
}

/* ========================= */
/* 🔥 NEW PORTAL (FIXED) */
/* ========================= */

.portal-door{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50% 50% 0 0 / 20% 20% 0 0;
    overflow:hidden;
    background:#000;
}

/* outer stone */
.portal-door::before{
    content:'';
    position:absolute;
    inset:-15px;
    background:linear-gradient(#4a4a4a,#2a2a2a);
    border-radius:inherit;
    z-index:-1;
}

/* MAIN SPIRAL (depth illusion) */
.portal-vortex{
    position:absolute;
    inset:-30%;
    border-radius:50%;

    background:
    radial-gradient(circle at center,
        transparent 10%,
        rgba(0,0,0,0.6) 60%,
        black 100%),

    repeating-conic-gradient(
        from 0deg,
        #d4af37 0deg 6deg,
        #4a1c6b 6deg 18deg,
        #1a3a3a 18deg 28deg,
        #0b1020 28deg 45deg
    );

    animation: spiral 12s linear infinite;
    transform-origin:center;
}

/* depth pull */
@keyframes spiral{
    0%{transform:rotate(0deg) scale(1);}
    50%{transform:rotate(180deg) scale(1.25);}
    100%{transform:rotate(360deg) scale(1);}
}

/* INNER CORE (pull effect) */
.portal-core{
    position:absolute;
    width:25%;
    height:25%;
    top:37%;
    left:37%;
    border-radius:50%;

    background:radial-gradient(circle,
        white 0%,
        #d4af37 20%,
        #4a1c6b 40%,
        transparent 70%
    );

    filter:blur(8px);
    animation:pulse 3s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{transform:scale(0.9);}
    50%{transform:scale(1.3);}
}

/* glass shimmer */
.portal-sheen{
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.1),transparent 60%);
    animation:shine 5s infinite;
}

@keyframes shine{
    from{transform:translateX(-100%);}
    to{transform:translateX(100%);}
}

/* label */
.portal-label{
    position:absolute;
    bottom:15%;
    left:50%;
    transform:translateX(-50%);
    font-family:'Cormorant SC',serif;
    color:white;
}

/* hover = stronger pull */
.door-frame:hover .portal-vortex{
    animation-duration:6s;
}

/* ========================= */
/* OTHER DOORS UNCHANGED */
/* ========================= */

/* star door */
.star-door .door-panel{
    position:absolute;
    inset:0;
    background:#2C1810;
}

/* ========================= */

</style>
</head>

<body>

<div id="curtain">
    <h1 class="wing-title">Study Wing</h1>
</div>

<div id="thought-stage">
    <div id="typewriter"></div>
    <span class="cursor">|</span>
</div>

<div id="doors-container">

<!-- READING (unchanged minimal for clarity) -->
<a class="door-frame">
    <div class="roman-door"></div>
</a>

<!-- 🔥 FIXED PORTAL -->
<a class="door-frame">
    <div class="portal-door">
        <div class="portal-vortex"></div>
        <div class="portal-core"></div>
        <div class="portal-sheen"></div>
        <div class="portal-label">Pattern Thoughts</div>
    </div>
</a>

<!-- STAR -->
<a class="door-frame">
    <div class="star-door">
        <div class="door-panel"></div>
    </div>
</a>

</div>

<script>
const text = "The body remembers what the mind forgets.";
let i=0;
function type(){
    if(i<text.length){
        document.getElementById("typewriter").innerHTML+=text[i];
        i++;
        setTimeout(type,40);
    }else{
        setTimeout(()=>{
            document.getElementById("thought-stage").style.opacity=0;
            document.getElementById("doors-container").classList.add("show");
        },2000);
    }
}
setTimeout(type,6500);
</script>

</body>
</html>
