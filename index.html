<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaVoxa | The Atrium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #center-glow {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 0.4em;
            color: rgba(200,190,180,0.3);
            text-shadow: 
                0 0 30px rgba(200,190,180,0.2),
                0 0 60px rgba(200,190,180,0.1);
            pointer-events: none;
            opacity: 0;
            animation: center-fade 4s ease-out forwards;
            animation-delay: 3s;
        }

        @keyframes center-fade {
            to { opacity: 1; }
        }

        .zone-label {
            position: absolute;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-label.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .zone-poetic {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: rgba(245,245,220,0.9);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.9);
        }

        .zone-name {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #f5f5dc;
            text-shadow: 0 2px 30px rgba(0,0,0,1);
        }

        #label-study { left: 15%; top: 35%; }
        #label-observatory { right: 15%; top: 35%; }
        #label-glam { left: 8%; bottom: 25%; }
        #label-salon { right: 8%; bottom: 25%; }

        #guidance {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: rgba(245,245,220,0.4);
            letter-spacing: 0.2em;
            opacity: 0;
            transition: opacity 3s ease;
        }

        #guidance.visible {
            opacity: 0.6;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        #transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        #transition.active {
            opacity: 1;
            pointer-events: all;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(200,190,180,0.5);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.3em;
            font-size: 1.2rem;
            transition: opacity 2s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading">AWAKENING</div>
    
    <div id="transition"></div>
    
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="center-glow">MetaVoxa</div>
        
        <div class="zone-label" id="label-study">
            <div class="zone-poetic">Where patterns become visible</div>
            <div class="zone-name">Study Wing</div>
        </div>
        
        <div class="zone-label" id="label-observatory">
            <div class="zone-poetic">Where distance creates clarity</div>
            <div class="zone-name">Observatory</div>
        </div>
        
        <div class="zone-label" id="label-glam">
            <div class="zone-poetic">Where dressing is a discipline</div>
            <div class="zone-name">Glam Wing</div>
        </div>
        
        <div class="zone-label" id="label-salon">
            <div class="zone-poetic">Where the coven gathers</div>
            <div class="zone-name">Salon</div>
        </div>
        
        <div id="guidance">Begin where you are pulled.</div>
    </div>

    <script>
        // Three.js Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.02);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.3);
        scene.add(ambientLight);

        const centerLight = new THREE.PointLight(0xd4af37, 0.5, 20);
        centerLight.position.set(0, 0.5, 0);
        scene.add(centerLight);

        const studyLight = new THREE.PointLight(0xffaa55, 0.8, 15);
        studyLight.position.set(-4, 2, 2);
        studyLight.castShadow = true;
        scene.add(studyLight);

        const observatoryLight = new THREE.PointLight(0x6699ff, 0.6, 15);
        observatoryLight.position.set(4, 2, 2);
        scene.add(observatoryLight);

        // Materials
        const stoneMaterial = new THREE.MeshStandardMaterial({
            color: 0x6f686a,
            roughness: 0.9,
            metalness: 0.1
        });

        const marbleMaterial = new THREE.MeshStandardMaterial({
            color: 0x8a8587,
            roughness: 0.2,
            metalness: 0.1
        });

        const goldMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4af37,
            roughness: 0.3,
            metalness: 0.8,
            emissive: 0x221100,
            emissiveIntensity: 0.2
        });

        const woodMaterial = new THREE.MeshStandardMaterial({
            color: 0x4a3728,
            roughness: 0.8
        });

        const curtainMaterial = new THREE.MeshStandardMaterial({
            color: 0x8b4513,
            roughness: 0.9,
            side: THREE.DoubleSide
        });

        // Floor
        const floorGeometry = new THREE.PlaneGeometry(30, 30, 64, 64);
        const floorPos = floorGeometry.attributes.position;
        for (let i = 0; i < floorPos.count; i++) {
            const x = floorPos.getX(i);
            const y = floorPos.getY(i);
            const z = Math.sin(x * 0.5) * Math.cos(y * 0.5) * 0.05;
            floorPos.setZ(i, z);
        }
        floorGeometry.computeVertexNormals();
        
        const floor = new THREE.Mesh(floorGeometry, marbleMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // MetaVoxa floor glow
        const floorGlowGeometry = new THREE.CircleGeometry(2, 32);
        const floorGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xd4af37,
            transparent: true,
            opacity: 0.15
        });
        const floorGlow = new THREE.Mesh(floorGlowGeometry, floorGlowMaterial);
        floorGlow.rotation.x = -Math.PI / 2;
        floorGlow.position.y = 0.01;
        scene.add(floorGlow);

        // Architecture
        function createArch(x, z, scale, rotation = 0) {
            const group = new THREE.Group();
            
            const colGeometry = new THREE.BoxGeometry(0.4, 6, 0.4);
            const leftCol = new THREE.Mesh(colGeometry, stoneMaterial);
            leftCol.position.set(-1.5, 3, 0);
            leftCol.castShadow = true;
            
            const rightCol = new THREE.Mesh(colGeometry, stoneMaterial);
            rightCol.position.set(1.5, 3, 0);
            rightCol.castShadow = true;
            
            const archGeometry = new THREE.TorusGeometry(1.5, 0.2, 8, 20, Math.PI);
            const archTop = new THREE.Mesh(archGeometry, stoneMaterial);
            archTop.position.set(0, 6, 0);
            archTop.castShadow = true;
            
            group.add(leftCol, rightCol, archTop);
            group.position.set(x, 0, z);
            group.scale.set(scale, scale, scale);
            group.rotation.y = rotation;
            
            return group;
        }

        for (let i = 0; i < 5; i++) {
            const z = -i * 4;
            const scale = 1 - i * 0.15;
            const arch = createArch(0, z, scale);
            scene.add(arch);
        }

        const leftArch = createArch(-4, 0, 1.2, Math.PI / 6);
        scene.add(leftArch);
        
        const rightArch = createArch(4, 0, 1.2, -Math.PI / 6);
        scene.add(rightArch);

        // Study Wing
        const studyGroup = new THREE.Group();
        studyGroup.position.set(-4, 0, 2);
        studyGroup.rotation.y = Math.PI / 6;

        const deskGeometry = new THREE.BoxGeometry(1.5, 0.8, 0.8);
        const desk = new THREE.Mesh(deskGeometry, woodMaterial);
        desk.position.set(0, 0.4, 0);
        desk.castShadow = true;
        studyGroup.add(desk);

        const deskTopGeometry = new THREE.BoxGeometry(1.6, 0.05, 0.9);
        const deskTop = new THREE.Mesh(deskTopGeometry, woodMaterial);
        deskTop.position.set(0, 0.85, 0);
        studyGroup.add(deskTop);

        const lampBaseGeometry = new THREE.CylinderGeometry(0.1, 0.15, 0.1, 16);
        const lampBase = new THREE.Mesh(lampBaseGeometry, goldMaterial);
        lampBase.position.set(0.4, 0.9, 0.2);
        studyGroup.add(lampBase);

        const lampStemGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 8);
        const lampStem = new THREE.Mesh(lampStemGeometry, goldMaterial);
        lampStem.position.set(0.4, 1.1, 0.2);
        studyGroup.add(lampStem);

        const lampShadeGeometry = new THREE.ConeGeometry(0.2, 0.25, 16, 1, true);
        const lampShade = new THREE.Mesh(lampShadeGeometry, new THREE.MeshBasicMaterial({
            color: 0xffeebb,
            transparent: true,
            opacity: 0.8,
            side: THREE.DoubleSide
        }));
        lampShade.position.set(0.4, 1.25, 0.2);
        studyGroup.add(lampShade);

        const shelfGeometry = new THREE.BoxGeometry(0.3, 2, 1.5);
        const shelf = new THREE.Mesh(shelfGeometry, woodMaterial);
        shelf.position.set(-1, 1, -0.5);
        studyGroup.add(shelf);

        scene.add(studyGroup);

        // Observatory
        const observatoryGroup = new THREE.Group();
        observatoryGroup.position.set(4, 0, 2);
        observatoryGroup.rotation.y = -Math.PI / 6;

        const controlDeskGeometry = new THREE.BoxGeometry(2, 0.9, 0.6);
        const controlDesk = new THREE.Mesh(controlDeskGeometry, new THREE.MeshStandardMaterial({
            color: 0x2a2a35,
            roughness: 0.4,
            metalness: 0.6
        }));
        controlDesk.position.set(0, 0.45, 0);
        observatoryGroup.add(controlDesk);

        for (let i = 0; i < 3; i++) {
            const panelGeometry = new THREE.CircleGeometry(0.25, 32);
            const panel = new THREE.Mesh(panelGeometry, new THREE.MeshBasicMaterial({
                color: 0x87ceeb,
                transparent: true,
                opacity: 0.6
            }));
            panel.position.set(-0.6 + i * 0.6, 0.95, 0.31);
            panel.rotation.x = -Math.PI / 2;
            observatoryGroup.add(panel);
            
            const panelLight = new THREE.PointLight(0x87ceeb, 0.3, 2);
            panelLight.position.set(-0.6 + i * 0.6, 1.2, 0.5);
            observatoryGroup.add(panelLight);
        }

        scene.add(observatoryGroup);

        // Glam Wing
        const glamGroup = new THREE.Group();
        glamGroup.position.set(-2, 0, 4);
        glamGroup.rotation.y = Math.PI / 4;

        const pedestalGeometry = new THREE.CylinderGeometry(0.3, 0.4, 1, 8);
        const pedestal = new THREE.Mesh(pedestalGeometry, marbleMaterial);
        pedestal.position.set(0, 0.5, 0);
        pedestal.castShadow = true;
        glamGroup.add(pedestal);

        const mapGeometry = new THREE.BoxGeometry(0.8, 0.02, 0.6);
        const mapMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5f5dc,
            roughness: 0.9
        });
        const map = new THREE.Mesh(mapGeometry, mapMaterial);
        map.position.set(0, 1.05, 0);
        map.rotation.x = 0.2;
        glamGroup.add(map);

        const mapLight = new THREE.PointLight(0xffd700, 0.4, 3);
        mapLight.position.set(0, 0.8, 0);
        glamGroup.add(mapLight);

        scene.add(glamGroup);

        // Salon
        const salonGroup = new THREE.Group();
        salonGroup.position.set(2.5, 0, 3.5);
        salonGroup.rotation.y = -Math.PI / 3;

        const curtainGeometry = new THREE.PlaneGeometry(1.2, 3, 10, 10);
        const curtainLeft = new THREE.Mesh(curtainGeometry, curtainMaterial);
        curtainLeft.position.set(-0.8, 1.5, 0);
        curtainLeft.rotation.y = 0.3;
        
        const curtainPos = curtainGeometry.attributes.position;
        for (let i = 0; i < curtainPos.count; i++) {
            const x = curtainPos.getX(i);
            const z = Math.sin(x * 3) * 0.1;
            curtainPos.setZ(i, z);
        }
        curtainGeometry.computeVertexNormals();
        salonGroup.add(curtainLeft);

        const curtainRight = curtainLeft.clone();
        curtainRight.position.set(0.8, 1.5, 0);
        curtainRight.rotation.y = -0.3;
        curtainRight.scale.x = -1;
        salonGroup.add(curtainRight);

        const salonLight = new THREE.PointLight(0xffaa55, 0.5, 5);
        salonLight.position.set(0, 1.5, 1);
        salonGroup.add(salonLight);

        scene.add(salonGroup);

        // Neural Currents - Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 200;
        const posArray = new Float32Array(particlesCount * 3);
        const velocityArray = [];

        for (let i = 0; i < particlesCount; i++) {
            posArray[i * 3] = (Math.random() - 0.5) * 15;
            posArray[i * 3 + 1] = Math.random() * 5 + 1;
            posArray[i * 3 + 2] = (Math.random() - 0.5) * 15;
            
            velocityArray.push({
                x: (Math.random() - 0.5) * 0.01,
                y: (Math.random() - 0.5) * 0.005,
                z: (Math.random() - 0.5) * 0.01
            });
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xc8c8dc,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // Light streams
        const streamCurves = [];
        for (let i = 0; i < 5; i++) {
            const points = [];
            for (let j = 0; j < 20; j++) {
                points.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    2 + Math.random() * 3,
                    (Math.random() - 0.5) * 10
                ));
            }
            const curve = new THREE.CatmullRomCurve3(points);
            const tubeGeometry = new THREE.TubeGeometry(curve, 20, 0.02, 8, false);
            const tubeMaterial = new THREE.MeshBasicMaterial({
                color: 0xdcd2c8,
                transparent: true,
                opacity: 0.2
            });
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene.add(tube);
            streamCurves.push({ mesh: tube, curve: curve, offset: Math.random() * 100 });
        }

        // Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredZone = null;

        const zones = {
            study: { 
                position: new THREE.Vector3(-4, 1, 2), 
                radius: 2, 
                element: document.getElementById('label-study'),
                target: 'study-wing.html'
            },
            observatory: { 
                position: new THREE.Vector3(4, 1, 2), 
                radius: 2, 
                element: document.getElementById('label-observatory'),
                target: 'observatory.html'
            },
            glam: { 
                position: new THREE.Vector3(-2, 1, 4), 
                radius: 1.5, 
                element: document.getElementById('label-glam'),
                target: 'glam-wing.html'
            },
            salon: { 
                position: new THREE.Vector3(2.5, 1, 3.5), 
                radius: 1.5, 
                element: document.getElementById('label-salon'),
                target: 'salon.html'
            }
        };

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            gsap.to(camera.position, {
                x: mouse.x * 0.3,
                y: 1.6 + mouse.y * 0.1,
                duration: 1,
                ease: "power2.out"
            });

            let foundZone = null;
            for (const [key, zone] of Object.entries(zones)) {
                const distance = camera.position.distanceTo(zone.position);
                if (distance < zone.radius + 2) {
                    const screenPos = zone.position.clone().project(camera);
                    const screenX = (screenPos.x + 1) / 2 * window.innerWidth;
                    const screenY = (-screenPos.y + 1) / 2 * window.innerHeight;
                    
                    const mouseDistance = Math.sqrt(
                        Math.pow(event.clientX - screenX, 2) + 
                        Math.pow(event.clientY - screenY, 2)
                    );
                    
                    if (mouseDistance < 150) {
                        foundZone = key;
                    }
                }
            }

            if (foundZone !== hoveredZone) {
                if (hoveredZone) {
                    zones[hoveredZone].element.classList.remove('visible');
                    document.body.style.cursor = 'default';
                }
                
                if (foundZone) {
                    zones[foundZone].element.classList.add('visible');
                    document.body.style.cursor = 'pointer';
                }
                
                hoveredZone = foundZone;
            }
        }

        function onClick(event) {
            if (hoveredZone) {
                const zone = zones[hoveredZone];
                document.getElementById('transition').classList.add('active');
                setTimeout(() => {
                    window.location.href = zone.target;
                }, 1500);
            }
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particlesCount; i++) {
                positions[i * 3] += velocityArray[i].x + Math.sin(time * 0.5 + i) * 0.002;
                positions[i * 3 + 1] += velocityArray[i].y + Math.cos(time * 0.3 + i) * 0.001;
                positions[i * 3 + 2] += velocityArray[i].z;

                if (positions[i * 3 + 1] > 6) positions[i * 3 + 1] = 1;
                if (positions[i * 3 + 1] < 1) positions[i * 3 + 1] = 6;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            streamCurves.forEach((stream, i) => {
                stream.mesh.rotation.y = Math.sin(time * 0.1 + stream.offset) * 0.1;
                stream.mesh.material.opacity = 0.15 + Math.sin(time * 0.5 + stream.offset) * 0.1;
            });

            floorGlowMaterial.opacity = 0.1 + Math.sin(time * 0.8) * 0.05;
            curtainLeft.rotation.z = Math.sin(time * 0.5) * 0.02;
            curtainRight.rotation.z = Math.cos(time * 0.4) * 0.02;
            studyLight.intensity = 0.8 + Math.sin(time * 10) * 0.02 + Math.random() * 0.02;

            renderer.render(scene, camera);
        }

        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 2000);

        setTimeout(() => {
            document.getElementById('guidance').classList.add('visible');
        }, 8000);

        animate();
    </script>

</body>
</html>
