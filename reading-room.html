<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Room — MetaVoxa House</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/reading-room.css">
</head>
<body class="reading-room">
    <div class="ambient-candlelight"></div>
    
    <nav class="room-nav dark">
        <a href="index.html" class="back-link">← Lobby</a>
        <h1 class="room-title">The Floating Library</h1>
    </nav>

    <div class="category-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="books">Books that changed our minds</button>
        <button class="filter-btn" data-filter="research">Research & Academic</button>
        <button class="filter-btn" data-filter="essays">Essays & Journalism</button>
    </div>

    <main class="library-space">
        <div class="shelves-container" id="shelves">
            <!-- Shelves injected via JS -->
        </div>
    </main>

    <div class="reading-nook">
        <div class="recommendation-cta">
            <p>Found a book that belongs here?</p>
            <a href="https://forms.gle/nHzbZZntmG82Ueyi8" target="_blank" class="submit-book">
                Recommend a Book
            </a>
        </div>
    </div>

    <script src="js/data/books.js"></script>
    <script src="js/reading-room.js"></script>
</body>
</html>
