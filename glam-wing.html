<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Glam Wing — MetaVoxa</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050914;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #f0ead8;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── UNROLL — clip-path from centre outward (scroll unfurl) ── */
        .unroll-mask {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: inset(0 50% 0 50%);
            opacity: 0;
            animation: unrollMap 2.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s forwards;
        }

        @keyframes unrollMap {
            0%   { clip-path: inset(0 50% 0 50%); opacity: 0; }
            12%  { opacity: 1; }
            100% { clip-path: inset(0 0 0 0);  opacity: 1; }
        }

        /* ── MAP IMAGE — always contain, never crop ── */
        .map-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            display: block;
            transform: scale(1.04);
            animation: mapReveal 1.6s ease 0.9s forwards;
            will-change: transform;
        }

        @keyframes mapReveal {
            0%   { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .vignette {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center,
                transparent 40%,
                rgba(5,9,20,0.28) 70%,
                rgba(5,9,20,0.58) 100%);
            z-index: 2;
            opacity: 0;
            animation: fadeIn 1.5s ease 2.2s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ── CONTINENT ZONES ── */
        .continent-zone {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .continent-zone::before {
            content: '';
            position: absolute;
            top: -15%; left: -15%;
            width: 130%; height: 130%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(210,175,100,0) 0%, rgba(210,175,100,0) 100%);
            transition: all 0.6s ease;
            pointer-events: none;
            filter: blur(25px);
            opacity: 0;
        }

        .continent-zone:hover::before,
        .continent-zone.active::before {
            background: radial-gradient(ellipse at center,
                rgba(210,175,100,0.3) 0%,
                rgba(210,175,100,0.08) 40%,
                rgba(210,175,100,0) 70%);
            opacity: 1;
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,100% { opacity: 0.5; transform: scale(1); }
            50%     { opacity: 1;   transform: scale(1.08); }
        }

        .continent-label {
            position: absolute;
            bottom: 8%; left: 50%;
            transform: translateX(-50%) translateY(12px);
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(240,234,216,0.5);
            background: rgba(5,9,20,0.7);
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(210,175,100,0.15);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .continent-zone:hover .continent-label,
        .continent-zone.active .continent-label {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            color: rgba(210,175,100,0.95);
            border-color: rgba(210,175,100,0.5);
            box-shadow: 0 0 25px rgba(210,175,100,0.15);
        }

        /* zone positions */
        .zone-kaelum       { top:26.6%; left:44.9%; width:14.5%; height:16.0%; clip-path:polygon(0% 0%,100% 0%,100% 100%,65% 100%,40% 75%,15% 75%,0% 50%); }
        .zone-solenne      { top:31.9%; left:58.0%; width:21.7%; height:21.3%; clip-path:polygon(0% 0%,100% 0%,100% 75%,50% 75%,35% 55%,15% 55%,0% 35%); }
        .zone-oria         { top:42.6%; left:44.9%; width:17.4%; height:34.6%; clip-path:polygon(0% 0%,100% 0%,100% 100%,50% 100%,30% 85%,0% 85%); }
        .zone-wide-current { top:55.9%; left:20.3%; width:14.5%; height:23.9%; clip-path:polygon(0% 0%,100% 0%,100% 80%,60% 80%,40% 60%,0% 60%); }
        .zone-terra-somnia { top:71.8%; left:71.0%; width:14.5%; height:18.6%; cursor:pointer; clip-path:polygon(0% 0%,100% 0%,100% 100%,50% 100%,30% 80%,0% 80%); }

        .zone-terra-somnia:hover::before,
        .zone-terra-somnia.active::before {
            background: radial-gradient(ellipse at center,
                rgba(128,128,128,0.2) 0%, rgba(128,128,128,0.05) 50%, transparent 70%);
            animation: none;
        }
        .zone-terra-somnia .continent-label { font-style: italic; letter-spacing: 3px; }

        /* pins */
        .pin-marker { position:absolute; width:22px; height:22px; z-index:8; pointer-events:none; opacity:0; animation:pinFadeIn 0.5s ease forwards; }
        .pin-marker::after { content:''; position:absolute; top:50%; left:50%; width:10px; height:10px; background:rgba(210,175,100,0.85); border-radius:50% 50% 50% 0; transform:translate(-50%,-50%) rotate(-45deg); box-shadow:0 0 6px rgba(210,175,100,0.4); transition:all 0.3s ease; }
        @keyframes pinFadeIn { to { opacity: 1; } }
        .pin-marker.bounce::after { animation: pinBounce 0.6s ease; }
        @keyframes pinBounce { 0%,100%{transform:translate(-50%,-50%) rotate(-45deg) scale(1)} 30%{transform:translate(-50%,-65%) rotate(-45deg) scale(1.3)} 60%{transform:translate(-50%,-40%) rotate(-45deg) scale(0.9)} }

        .pin-1  { top:28%; left:28%; animation-delay:3.0s; }
        .pin-2  { top:19%; left:38%; animation-delay:3.15s; }
        .pin-3  { top:22%; left:41%; animation-delay:3.3s; }
        .pin-4  { top:18%; left:55%; animation-delay:3.45s; }
        .pin-5  { top:26%; left:75%; animation-delay:3.6s; }
        .pin-6  { top:40%; left:85%; animation-delay:3.75s; }
        .pin-7  { top:68%; left:88%; animation-delay:3.9s; }
        .pin-8  { top:55%; left:31%; animation-delay:4.05s; }
        .pin-9  { top:47%; left:27%; animation-delay:4.2s; }
        .pin-10 { top:52%; left:20%; animation-delay:4.35s; }

        /* geysers */
        .geyser { position:absolute; width:3px; z-index:5; pointer-events:none; opacity:0; animation:geyserFadeIn 2s ease 2.5s forwards; }
        @keyframes geyserFadeIn { to { opacity: 1; } }
        .geyser-wisp { position:absolute; width:2px; background:linear-gradient(to top,rgba(255,255,255,0.25) 0%,rgba(255,255,255,0.08) 50%,transparent 100%); border-radius:50%; animation:smokeRise 5s ease-in-out infinite; }
        @keyframes smokeRise { 0%{height:0;opacity:0;transform:translateX(0) scale(1)} 15%{opacity:0.5} 85%{opacity:0.2} 100%{height:70px;opacity:0;transform:translateX(12px) scale(1.8)} }
        .geyser-1{top:10%;left:13%} .geyser-2{top:12%;left:35%} .geyser-3{top:8%;left:56%} .geyser-4{top:15%;left:71%} .geyser-5{top:63%;left:49%}
        .geyser .wisp-1{animation-delay:0s;left:0} .geyser .wisp-2{animation-delay:1.5s;left:3px} .geyser .wisp-3{animation-delay:3s;left:-2px}

        /* terra tooltip */
        .terra-tooltip { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9); background:rgba(5,9,20,0.92); border:1px solid rgba(128,128,128,0.35); padding:14px 22px; border-radius:10px; font-size:0.8rem; letter-spacing:1.5px; color:rgba(200,200,200,0.85); opacity:0; pointer-events:none; transition:all 0.35s ease; white-space:nowrap; z-index:20; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); box-shadow:0 4px 20px rgba(0,0,0,0.4); }
        .zone-terra-somnia:hover .terra-tooltip,
        .zone-terra-somnia.active .terra-tooltip { opacity:1; transform:translate(-50%,-50%) scale(1); }

        /* nav */
        .back-lobby { position:fixed; bottom:20px; left:20px; z-index:30; display:flex; align-items:center; gap:8px; text-decoration:none; color:rgba(240,234,216,0.45); font-size:0.75rem; letter-spacing:1px; transition:all 0.3s ease; padding:8px 14px; border-radius:24px; background:rgba(5,9,20,0.5); border:1px solid rgba(240,234,216,0.1); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
        .back-lobby:hover { color:rgba(210,175,100,0.9); border-color:rgba(210,175,100,0.35); background:rgba(5,9,20,0.7); }
        .back-lobby svg { width:16px; height:16px; fill:currentColor; }
        .audio-toggle { position:fixed; bottom:20px; right:20px; z-index:30; width:38px; height:38px; border-radius:50%; border:1px solid rgba(240,234,216,0.15); background:rgba(5,9,20,0.5); color:rgba(240,234,216,0.5); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s ease; font-size:0.9rem; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); -webkit-tap-highlight-color:transparent; }
        .audio-toggle:hover { border-color:rgba(210,175,100,0.4); color:rgba(210,175,100,0.8); }
        .audio-toggle.active { border-color:rgba(210,175,100,0.5); color:rgba(210,175,100,0.9); box-shadow:0 0 15px rgba(210,175,100,0.1); }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .map-image {
                /* force proper sizing on portrait phones */
                width: 100vw;
                height: 100vh;
                object-fit: contain;
                object-position: center center;
            }
            .continent-label { font-size:0.68rem; padding:4px 10px; letter-spacing:1.5px; }
            .pin-marker { width:18px; height:18px; }
            .pin-marker::after { width:8px; height:8px; }
            .back-lobby { bottom:15px; left:15px; font-size:0.7rem; padding:6px 10px; }
            .audio-toggle { bottom:15px; right:15px; width:34px; height:34px; }
            .terra-tooltip { font-size:0.75rem; padding:10px 16px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .unroll-mask  { animation:none; clip-path:inset(0% 0 0% 0); opacity:1; }
            .map-image    { animation:none; transform:scale(1); }
            .vignette     { animation:none; opacity:1; }
            .continent-zone::before { animation:none; }
            .geyser       { animation:none; opacity:1; }
            .geyser-wisp  { animation:none; opacity:0.25; height:35px; }
            .pin-marker   { animation:none; opacity:1; }
        }
    </style>
</head>
<body>

<div class="map-wrapper">
    <div class="unroll-mask">

        <img src="IMG_glam.jpg" alt="Glam Wing Map"
             class="map-image" id="mapImage"
             loading="eager" decoding="async">

        <div class="vignette"></div>

        <div class="geyser geyser-1"><div class="geyser-wisp wisp-1"></div><div class="geyser-wisp wisp-2"></div><div class="geyser-wisp wisp-3"></div></div>
        <div class="geyser geyser-2"><div class="geyser-wisp wisp-1"></div><div class="geyser-wisp wisp-2"></div><div class="geyser-wisp wisp-3"></div></div>
        <div class="geyser geyser-3"><div class="geyser-wisp wisp-1"></div><div class="geyser-wisp wisp-2"></div><div class="geyser-wisp wisp-3"></div></div>
        <div class="geyser geyser-4"><div class="geyser-wisp wisp-1"></div><div class="geyser-wisp wisp-2"></div><div class="geyser-wisp wisp-3"></div></div>
        <div class="geyser geyser-5"><div class="geyser-wisp wisp-1"></div><div class="geyser-wisp wisp-2"></div><div class="geyser-wisp wisp-3"></div></div>

        <div class="pin-marker pin-1"></div><div class="pin-marker pin-2"></div>
        <div class="pin-marker pin-3"></div><div class="pin-marker pin-4"></div>
        <div class="pin-marker pin-5"></div><div class="pin-marker pin-6"></div>
        <div class="pin-marker pin-7"></div><div class="pin-marker pin-8"></div>
        <div class="pin-marker pin-9"></div><div class="pin-marker pin-10"></div>

        <a href="oria.html" class="continent-zone zone-oria" data-continent="oria">
    <span class="continent-label">Oria</span>
</a>

<a href="kaelum.html" class="continent-zone zone-kaelum" data-continent="kaelum">
    <span class="continent-label">Kaelum</span>
</a>

<a href="solenne.html" class="continent-zone zone-solenne" data-continent="solenne">
    <span class="continent-label">Solenne</span>
</a>

<a href="wide-current.html" class="continent-zone zone-wide-current" data-continent="wide-current">
    <span class="continent-label">The Wide Current</span>
</a>

<a href="terra-somnia.html" class="continent-zone zone-terra-somnia" data-continent="terra-somnia">
    <span class="continent-label">Terra Somnia</span>
    <div class="terra-tooltip">Terra Somnia — Uncharted. Not yet.</div>
</a>

    </div>
</div>

<a href="index.html" class="back-lobby" aria-label="Back to Lobby">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/>
    </svg>
    <span>Lobby</span>
</a>

<button class="audio-toggle" id="audioToggle" aria-label="Toggle ambient sound">🔇</button>

<script>
(function () {
    'use strict';

    var isMobile = window.matchMedia('(max-width: 768px)').matches
        || 'ontouchstart' in window
        || navigator.maxTouchPoints > 0;

    var zones = document.querySelectorAll('a.continent-zone');
    var activeZone = null;

    /* mobile: first tap shows label, second tap navigates */
if (isMobile) {
    zones.forEach(function (zone) {
        zone.addEventListener('touchend', function (e) {
            e.preventDefault();
            e.stopPropagation();

            var href = this.getAttribute('href');
            if ('href') window.location.href = href;
        }, { passive: false });
    });
}

    document.addEventListener('touchstart', function (e) {
        if (!e.target.closest('.continent-zone')) {
            zones.forEach(function (z) { z.classList.remove('active'); });
            activeZone = null;
        }
    });
}
    
    /* pin bounce on hover */
    zones.forEach(function (zone) {
        zone.addEventListener('mouseenter', function () {
            var pinMap = {
                'oria':         [4, 5],
                'kaelum':       [1, 2, 3],
                'solenne':      [4, 5],
                'wide-current': [0, 7, 8, 9],
                'terra-somnia': [6]
            };
            var indices = pinMap[this.dataset.continent] || [];
            var allPins = document.querySelectorAll('.pin-marker');
            indices.map(function (i) { return allPins[i]; })
                   .filter(Boolean)
                   .forEach(function (pin) {
                       pin.classList.remove('bounce');
                       void pin.offsetWidth;
                       pin.classList.add('bounce');
                       setTimeout(function () { pin.classList.remove('bounce'); }, 600);
                   });
        });
    });

    /* ambient audio */
    var audioContext = null, oscillators = [], isPlaying = false;
    var audioToggle = document.getElementById('audioToggle');

    function initAudio() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        [[55,'sine'],[82.5,'triangle'],[110,'sine']].forEach(function (p) {
            var osc = audioContext.createOscillator();
            var gain = audioContext.createGain();
            osc.type = p[1]; osc.frequency.value = p[0]; gain.gain.value = 0.015;
            osc.connect(gain); gain.connect(audioContext.destination); osc.start();
            oscillators.push({ osc: osc, gain: gain });
        });
        setInterval(function () {
            oscillators.forEach(function (o) {
                o.gain.gain.setTargetAtTime(0.015 + (Math.random()-0.5)*0.005, audioContext.currentTime, 2);
            });
        }, 3000);
    }

    function stopAudio() {
        oscillators.forEach(function (o) { try { o.osc.stop(); } catch(e){} });
        oscillators = [];
    }

    audioToggle.addEventListener('click', function () {
        if (isPlaying) {
            stopAudio(); audioToggle.textContent = '🔇'; audioToggle.classList.remove('active'); isPlaying = false;
        } else {
            initAudio(); audioToggle.textContent = '🔊'; audioToggle.classList.add('active'); isPlaying = true;
        }
    });

    /* map image error fallback */
    document.getElementById('mapImage').addEventListener('error', function () {
        document.body.style.background = 'linear-gradient(135deg,#1a1510 0%,#2d2418 50%,#1a1510 100%)';
        this.style.display = 'none';
        var fb = document.createElement('div');
        fb.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:rgba(240,234,216,0.6);font-size:1.2rem;letter-spacing:2px;z-index:100;';
        fb.innerHTML = '<p>Glam Wing Map</p><p style="font-size:0.8rem;margin-top:10px;opacity:0.5;">Upload IMG_glam.jpg to your repository</p>';
        document.querySelector('.unroll-mask').appendChild(fb);
    });

    /* initial pin bounce */
    setTimeout(function () {
        document.querySelectorAll('.pin-marker').forEach(function (pin, i) {
            setTimeout(function () {
                pin.classList.remove('bounce'); void pin.offsetWidth; pin.classList.add('bounce');
                setTimeout(function () { pin.classList.remove('bounce'); }, 600);
            }, i * 120);
        });
    }, 3000);

})();
</script>
</body>
</html>
