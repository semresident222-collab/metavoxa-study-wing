<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Thoughts | MetaVoxa Palace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --burgundy-deep: #4A0404;
            --burgundy-rich: #6B0F1A;
            --burgundy-ghost: rgba(74, 4, 4, 0.3);
            --gold-antique: #D4AF37;
            --gold-deep: #B8941F;
            --gold-soft: #C9A961;
            --terracotta: #C65D3B;
            --ivory-warm: #F5F0E8;
            --ivory-aged: #E8E0D0;
            --ivory-paper: #FAF8F3;
            --navy-deep: #0A0F1F;
            --navy-warm: #0F1419;
            --ink-dark: #1A1A1A;
            --ink-brown: #2C2416;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(180deg, var(--navy-deep) 0%, #0F0F14 100%);
            color: var(--ink-dark);
            opacity: 0;
            animation: fadeInRoom 3s ease-out forwards;
        }

        @keyframes fadeInRoom {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Grain Texture */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Exit Door */
        .exit-door {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 200;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.6;
            transition: all 0.4s ease;
        }

        .exit-door:hover { opacity: 1; }

        .door-icon {
            width: 28px;
            height: 42px;
            border: 1px solid var(--gold-antique);
            border-radius: 14px 14px 2px 2px;
            position: relative;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.1), transparent);
        }

        .door-icon::after {
            content: '';
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 2px;
            background: var(--gold-antique);
            border-radius: 50%;
        }

        .exit-text {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            color: var(--gold-antique);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* The Key Navigation */
        .the-key {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            width: 44px;
            height: 44px;
            cursor: pointer;
            transition: transform 0.4s ease;
            opacity: 0.7;
        }

        .the-key:hover {
            transform: rotate(90deg);
            opacity: 1;
        }

        .key-icon {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--gold-antique);
            stroke-width: 1.5;
        }

        .key-menu {
            position: fixed;
            bottom: 90px;
            right: 30px;
            z-index: 199;
            background: rgba(10, 15, 31, 0.95);
            border: 1px solid var(--gold-antique);
            border-radius: 4px;
            padding: 20px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .key-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .key-menu h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: var(--gold-antique);
            margin-bottom: 15px;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding-bottom: 10px;
        }

        .key-menu a {
            display: block;
            color: var(--ivory-aged);
            text-decoration: none;
            padding: 8px 0;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .key-menu a:hover {
            color: var(--gold-antique);
            padding-left: 5px;
        }

        /* Main Container */
        .pattern-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px 120px;
            position: relative;
            z-index: 50;
        }

        /* 3D Calendar with Spiral Holes */
        .calendar-wrapper {
            perspective: 1200px;
            margin-bottom: 40px;
        }

        .calendar-base {
            background: linear-gradient(180deg, var(--burgundy-deep) 0%, var(--burgundy-rich) 100%);
            border-radius: 12px 12px 4px 4px;
            padding: 25px 20px 20px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 10px 30px rgba(74, 4, 4, 0.3),
                inset 0 2px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* Spiral Holes */
        .spiral-holes {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        .spiral-hole {
            width: 14px;
            height: 14px;
            background: var(--navy-deep);
            border-radius: 50%;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.5),
                0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .spiral-hole::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: var(--gold-antique);
            border-radius: 50%;
            opacity: 0.6;
        }

        /* Calendar Header Info */
        .calendar-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .pattern-number-display {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--gold-antique);
            letter-spacing: 0.1em;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .year-display {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--gold-soft);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: right;
        }

        .year-display .year-name {
            font-size: 0.9rem;
            color: var(--gold-antique);
            display: block;
            margin-top: 3px;
        }

        /* Flip Container */
        .flip-container {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flip-container.flipping {
            animation: flipPage 1s ease-in-out;
        }

        @keyframes flipPage {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(-90deg); }
            100% { transform: rotateX(0deg); }
        }

        /* Calendar Page */
        .calendar-page {
            background: linear-gradient(135deg, var(--ivory-paper) 0%, #F5F0E8 100%);
            border-radius: 3px;
            padding: 40px 35px;
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.1),
                inset 0 0 60px rgba(139, 90, 43, 0.02);
            position: relative;
            min-height: 380px;
        }

        /* Page texture */
        .calendar-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            border-radius: 3px;
        }

        /* Ghost Connections */
        .ghost-connections {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .calendar-page:hover .ghost-connections {
            opacity: 1;
        }

        .ghost-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(74, 4, 4, 0.15), transparent);
        }

        /* Pattern Content */
        .pattern-content {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .pattern-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 3.5vw, 1.9rem);
            line-height: 1.5;
            margin-bottom: 35px;
            color: var(--ink-dark);
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--burgundy-rich);
            margin-left: 3px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        .cursor.hidden {
            display: none;
        }

        @keyframes blink {
            0%, 45% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .pattern-body {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.05rem, 2.2vw, 1.2rem);
            line-height: 1.9;
            color: var(--ink-dark);
            opacity: 0.9;
            margin-bottom: 40px;
            min-height: 120px;
        }

        /* Deeper Layer - Ghost Burgundy */
        .deeper-layer {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--burgundy-ghost);
            text-align: center;
            max-width: 450px;
            margin: 0 auto;
            padding: 15px 20px;
            border-top: 1px solid rgba(74, 4, 4, 0.1);
            transition: all 0.4s ease;
            cursor: help;
        }

        .deeper-layer:hover {
            color: var(--burgundy-deep);
            font-weight: 500;
            background: rgba(74, 4, 4, 0.03);
        }

        .deeper-label {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--burgundy-ghost);
            margin-bottom: 8px;
            display: block;
            transition: color 0.4s ease;
        }

        .deeper-layer:hover .deeper-label {
            color: var(--burgundy-rich);
        }

        /* Expand Button */
        .expand-section {
            margin-top: 25px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }

        .expand-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .expand-btn {
            display: inline-block;
            padding: 10px 25px;
            border: 1px solid var(--burgundy-rich);
            color: var(--burgundy-deep);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.4s ease;
            background: transparent;
        }

        .expand-btn:hover {
            background: var(--burgundy-deep);
            color: var(--ivory-warm);
        }

        /* Navigation */
        .pattern-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            width: 45px;
            height: 45px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(10, 15, 31, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border-radius: 50%;
        }

        .nav-btn:hover {
            border-color: var(--gold-antique);
            background: rgba(212, 175, 55, 0.1);
        }

        .nav-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--gold-antique);
            stroke-width: 1.5;
            fill: none;
        }

        /* Archive Section */
        .archive-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
        }

        .archive-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .archive-header h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: var(--gold-antique);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Year Grid */
        .year-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .year-item {
            background: rgba(10, 15, 31, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 4px;
        }

        .year-item:hover {
            border-color: var(--gold-antique);
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .year-item.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold-antique);
        }

        .year-item .year-num {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--gold-antique);
            display: block;
            margin-bottom: 5px;
        }

        .year-item .year-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: var(--ivory-aged);
            font-style: italic;
        }

        /* Days Grid (hidden by default) */
        .days-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(10, 15, 31, 0.4);
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .days-grid.active {
            display: grid;
        }

        .day-item {
            aspect-ratio: 1;
            border: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            color: var(--ivory-aged);
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .day-item:hover {
            border-color: var(--gold-antique);
            background: rgba(212, 175, 55, 0.1);
        }

        .day-item.today {
            background: var(--gold-antique);
            color: var(--navy-deep);
            border-color: var(--gold-antique);
            font-weight: 600;
        }

        .day-item.selected {
            background: rgba(212, 175, 55, 0.25);
            border-color: var(--gold-antique);
        }

        /* Giscus Container */
        .giscus-container {
            margin-top: 40px;
            padding: 25px;
            background: rgba(10, 15, 31, 0.4);
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .giscus-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .giscus-header h4 {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--gold-antique);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .giscus-closed {
            text-align: center;
            padding: 25px;
            font-style: italic;
            color: var(--gold-soft);
            opacity: 0.7;
            font-size: 0.95rem;
        }

        /* Today Marker */
        .today-marker {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--gold-antique);
            color: var(--navy-deep);
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 150;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calendar-base {
                padding: 20px 15px 15px;
            }

            .calendar-page {
                padding: 30px 25px;
                min-height: 320px;
            }

            .spiral-holes {
                padding: 0 15px;
            }

            .spiral-hole {
                width: 12px;
                height: 12px;
            }

            .year-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Grain Overlay -->
    <div class="grain-overlay"></div>

    <!-- Today Marker -->
    <div class="today-marker" id="todayMarker">Today</div>

    <!-- Exit Door -->
    <a href="index.html" class="exit-door">
        <div class="door-icon"></div>
        <span class="exit-text">To Study Wing</span>
    </a>

    <!-- The Key Navigation -->
    <div class="the-key" id="theKey">
        <svg class="key-icon" viewBox="0 0 50 50">
            <circle cx="20" cy="20" r="7"/>
            <path d="M26 26 L42 42 M42 42 L35 42 M42 42 L42 35"/>
            <rect x="17" y="28" width="6" height="12" rx="1"/>
        </svg>
    </div>

    <div class="key-menu" id="keyMenu">
        <h3>The Palace</h3>
        <a href="index.html">The Lobby</a>
        <a href="reading-room.html">Reading Room</a>
        <a href="star-of-the-month.html">Star of the Month</a>
        <a href="pattern-thoughts.html">Pattern Thoughts</a>
    </div>

    <!-- Main Container -->
    <main class="pattern-container">
        <!-- 3D Calendar -->
        <div class="calendar-wrapper">
            <div class="calendar-base">
                <!-- Spiral Holes -->
                <div class="spiral-holes">
                    <div class="spiral-hole"></div>
                    <div class="spiral-hole"></div>
                    <div class="spiral-hole"></div>
                    <div class="spiral-hole"></div>
                    <div class="spiral-hole"></div>
                </div>

                <!-- Header Info -->
                <div class="calendar-header-info">
                    <div class="pattern-number-display" id="patternNumber"></div>
                    <div class="year-display">
                        <span id="yearNum">2026</span>
                        <span class="year-name" id="yearName">Year of the Reader</span>
                    </div>
                </div>

                <!-- Flip Container -->
                <div class="flip-container" id="flipContainer">
                    <div class="calendar-page" id="calendarPage">
                        <div class="ghost-connections" id="ghostConnections"></div>

                        <div class="pattern-content">
                            <h2 class="pattern-title" id="patternTitle">
                                <span id="titleText"></span><span class="cursor hidden" id="cursor"></span>
                            </h2>
                            <div class="pattern-body" id="patternBody"></div>
                            <div class="deeper-layer" id="deeperLayer">
                                <span class="deeper-label">Deeper Layer</span>
                                <span id="deeperText"></span>
                            </div>
                        </div>

                        <div class="expand-section" id="expandSection">
                            <a href="#" class="expand-btn" id="expandBtn" target="_blank">Expand Thought</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="pattern-nav">
            <button class="nav-btn" id="prevBtn" onclick="navigatePattern(-1)">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button class="nav-btn" id="nextBtn" onclick="navigatePattern(1)">
                <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>

        <!-- Archive -->
        <div class="archive-section">
            <div class="archive-header">
                <h3>Archive</h3>
            </div>

            <!-- Year Grid -->
            <div class="year-grid" id="yearGrid">
                <div class="year-item" data-year="2026" onclick="selectYear(2026)">
                    <span class="year-num">2026</span>
                    <span class="year-name">Year of the Reader</span>
                </div>
                <div class="year-item" data-year="2027" onclick="selectYear(2027)">
                    <span class="year-num">2027</span>
                    <span class="year-name">Year of the Writer</span>
                </div>
                <div class="year-item" data-year="2028" onclick="selectYear(2028)">
                    <span class="year-num">2028</span>
                    <span class="year-name">Year of the Researcher</span>
                </div>
                <div class="year-item" data-year="2029" onclick="selectYear(2029)">
                    <span class="year-num">2029</span>
                    <span class="year-name">Year of the Explorer</span>
                </div>
            </div>

            <!-- Days Grid (per year) -->
            <div class="days-grid" id="daysGrid"></div>
        </div>

        <!-- Giscus Discussion -->
        <div class="giscus-container" id="giscusContainer">
            <div class="giscus-header">
                <h4>Today's Reflection</h4>
            </div>
            <div id="giscus"></div>
        </div>
    </main>

    <script>
        // Pattern Thoughts Data
        const patternThoughts = [
            {
                number: "001",
                title: "The silence between words is where meaning lives.",
                body: "We fill our days with noise—notifications, opinions, the endless scroll. But meaning doesn't arrive announced. It slips in during the pause. The breath between sentences. The moment before you respond. Today, notice where you rush to fill the quiet. What might be waiting there?",
                deeper: "The quietest people often have the loudest minds.",
                connections: ["015", "042", "089"],
                substackUrl: ""
            },
            {
                number: "002",
                title: "You are not late. The world is just early.",
                body: "We measure ourselves against clocks that were never ours. Someone else's timeline. Someone else's finish line. But growth has its own rhythm. The seed doesn't apologize for taking time to break soil. The river doesn't rush to reach the sea.",
                deeper: "The most interesting people took the scenic route.",
                connections: ["027", "056", "103"],
                substackUrl: ""
            },
            {

        // Generate remaining patterns (018-365)
        for (let i = 18; i <= 365; i++) {
            const num = i.toString().padStart(3, '0');
            patternThoughts.push({
                number: num,
                title: `Pattern Thought ${num}`,
                body: "This pattern thought is unfolding. Each day brings a new compression of intelligence—a thought that stands alone, sits through noise, and connects to others.",
                deeper: "The deeper layer reveals itself to those who sit with the question.",
                connections: [],
                substackUrl: ""
            });
        }

        // Year configuration
        const yearConfig = {
            2026: { name: "Reader", index: 0 },
            2027: { name: "Writer", index: 1 },
            2028: { name: "Researcher", index: 2 },
            2029: { name: "Explorer", index: 3 },
            2030: { name: "Reader", index: 4, note: "(not the same person)" }
        };

        // State
        let currentIndex = 0;
        let selectedYear = 2026;
        let isTyping = false;

        // Get current pattern based on date
        function getTodayIndex() {
            const now = new Date();
            const start = new Date(2026, 0, 1);
            const diff = now - start;
            const dayIndex = Math.floor(diff / (1000 * 60 * 60 * 24));
            return Math.max(0, Math.min(dayIndex, 364));
        }

        // Get year from index
        function getYearFromIndex(index) {
            const yearOffset = Math.floor(index / 365);
            const baseYear = 2026;
            return baseYear + yearOffset;
        }

        // Sleep helper
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Typewriter effect with cursor
        async function typeText(element, text, speed = 40) {
            const cursor = document.getElementById('cursor');
            cursor.classList.remove('hidden');

            element.textContent = '';
            isTyping = true;

            for (let i = 0; i < text.length; i++) {
                element.textContent += text.charAt(i);
                await sleep(speed);
            }

            isTyping = false;
        }

        // Sequential reveal with pauses
        async function revealPatternSequentially(pattern) {
            const cursor = document.getElementById('cursor');
            const year = getYearFromIndex(currentIndex);
            const config = yearConfig[year];

            // Step 1: Show number (instant)
            document.getElementById('patternNumber').textContent = pattern.number;
            await sleep(600);

            // Step 2: Type year number
            const yearNumEl = document.getElementById('yearNum');
            yearNumEl.textContent = '';
            cursor.classList.remove('hidden');
            await typeText(yearNumEl, year.toString(), 50);
            await sleep(400);

            // Step 3: Show year name
            const yearNameEl = document.getElementById('yearName');
            yearNameEl.style.opacity = '0';
            yearNameEl.textContent = `Year of the ${config.name}`;
            if (config.note) {
                yearNameEl.textContent += ` ${config.note}`;
            }
            yearNameEl.style.transition = 'opacity 0.8s ease';
            await sleep(200);
            yearNameEl.style.opacity = '1';
            await sleep(800);

            // Step 4: Type title
            cursor.classList.remove('hidden');
            await typeText(document.getElementById('titleText'), pattern.title, 35);
            await sleep(500);

            // Step 5: Fade in body
            const bodyEl = document.getElementById('patternBody');
            bodyEl.textContent = pattern.body;
            bodyEl.style.opacity = '0';
            bodyEl.style.transition = 'opacity 1.2s ease';
            await sleep(300);
            bodyEl.style.opacity = '0.9';
            await sleep(1200);

            // Step 6: Hide cursor permanently
            cursor.classList.add('hidden');

            // Step 7: Reveal deeper layer
            document.getElementById('deeperText').textContent = pattern.deeper;
            await sleep(400);

            // Show expand button if applicable
            if (pattern.substackUrl) {
                document.getElementById('expandBtn').href = pattern.substackUrl;
                document.getElementById('expandSection').classList.add('visible');
            }
        }

        // Render ghost connections
        function renderGhostConnections(connections) {
            const container = document.getElementById('ghostConnections');
            container.innerHTML = '';

            connections.forEach((conn, i) => {
                const line = document.createElement('div');
                line.className = 'ghost-line';
                line.style.top = `${25 + (i * 12)}%`;
                line.style.left = '5%';
                line.style.width = '90%';
                line.style.transform = `rotate(${(i - 1) * 3}deg)`;
                container.appendChild(line);
            });
        }

        // Render pattern
        async function renderPattern(index) {
            if (isTyping) return;

            const pattern = patternThoughts[index];
            const todayIndex = getTodayIndex();
            const isToday = index === todayIndex;

            // Flip animation
            const container = document.getElementById('flipContainer');
            container.classList.add('flipping');

            // Reset visibility
            document.getElementById('yearName').style.opacity = '0';
            document.getElementById('patternBody').style.opacity = '0';
            document.getElementById('expandSection').classList.remove('visible');

            await sleep(400);

            // Sequential reveal
            await revealPatternSequentially(pattern);

            // Render connections
            renderGhostConnections(pattern.connections);

            // Update Giscus
            updateGiscus(pattern.number, isToday, todayIndex);

            // Update archive
            updateArchiveSelection(index);

            container.classList.remove('flipping');
            currentIndex = index;
            selectedYear = getYearFromIndex(index);
        }

        // Update Giscus
        function updateGiscus(patternNum, isToday, todayIndex) {
            const container = document.getElementById('giscus');
            const header = document.querySelector('.giscus-header h4');

            container.innerHTML = '';

            if (isToday) {
                header.textContent = "Today's Reflection";

                const script = document.createElement('script');
                script.src = "https://giscus.app/client.js";
                script.setAttribute('data-repo', 'semresident222-collab/metavoxa-study-wing');
                script.setAttribute('data-repo-id', 'R_kgDOR3nrxA');
                script.setAttribute('data-category', 'Pattern Thoughts');
                script.setAttribute('data-category-id', 'DIC_kwDOR3nrxM4C554W');
                script.setAttribute('data-mapping', 'specific');
                script.setAttribute('data-term', `pattern-thought-${patternNum}`);
                script.setAttribute('data-strict', '0');
                script.setAttribute('data-reactions-enabled', '1');
                script.setAttribute('data-emit-metadata', '0');
                script.setAttribute('data-input-position', 'bottom');
                script.setAttribute('data-theme', 'preferred_color_scheme');
                script.setAttribute('data-lang', 'en');
                script.setAttribute('crossorigin', 'anonymous');
                script.async = true;

                container.appendChild(script);
            } else if (currentIndex < todayIndex) {
                header.textContent = "Reflection Closed";
                container.innerHTML = `
                    <div class="giscus-closed">
                        This pattern thought's discussion period has ended.<br>
                        You may still react, but new replies are closed.
                    </div>
                `;
            } else {
                header.textContent = "Future Pattern";
                container.innerHTML = `
                    <div class="giscus-closed">
                        This pattern thought has not yet been revealed.<br>
                        Return on its designated day to participate.
                    </div>
                `;
            }
        }

        // Select year in archive
        function selectYear(year) {
            selectedYear = year;

            // Update active state
            document.querySelectorAll('.year-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.year) === year);
            });

            // Show days grid
            const daysGrid = document.getElementById('daysGrid');
            daysGrid.innerHTML = '';
            daysGrid.classList.add('active');

            const yearOffset = year - 2026;
            const startIndex = yearOffset * 365;
            const todayIndex = getTodayIndex();

            for (let i = 0; i < 365; i++) {
                const dayIndex = startIndex + i;
                if (dayIndex >= patternThoughts.length) break;

                const dayItem = document.createElement('div');
                dayItem.className = 'day-item';
                dayItem.textContent = (i + 1).toString().padStart(3, '0');

                if (dayIndex === todayIndex) {
                    dayItem.classList.add('today');
                }
                if (dayIndex === currentIndex) {
                    dayItem.classList.add('selected');
                }

                dayItem.onclick = () => {
                    renderPattern(dayIndex);
                    document.getElementById('daysGrid').classList.remove('active');
                };

                daysGrid.appendChild(dayItem);
            }
        }

        // Update archive selection
        function updateArchiveSelection(index) {
            const year = getYearFromIndex(index);

            // Update year items
            document.querySelectorAll('.year-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.year) === year);
            });

            // Update day items if visible
            document.querySelectorAll('.day-item').forEach((item, i) => {
                const yearOffset = year - 2026;
                const dayIndex = (yearOffset * 365) + i;
                item.classList.toggle('selected', dayIndex === index);
            });
        }

        // Navigation
        function navigatePattern(direction) {
            if (isTyping) return;

            const newIndex = currentIndex + direction;
            if (newIndex >= 0 && newIndex < patternThoughts.length) {
                renderPattern(newIndex);
            }
        }

        // Check for midnight flip
        function checkMidnightFlip() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);

            const msUntilMidnight = tomorrow - now;

            setTimeout(() => {
                const todayIndex = getTodayIndex();
                renderPattern(todayIndex);
                checkMidnightFlip();
            }, msUntilMidnight);
        }

        // The Key Menu
        document.getElementById('theKey').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('keyMenu').classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            const key = document.getElementById('theKey');
            const menu = document.getElementById('keyMenu');
            if (!key.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const todayIndex = getTodayIndex();
            renderPattern(todayIndex);
            checkMidnightFlip();
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') navigatePattern(-1);
            if (e.key === 'ArrowRight') navigatePattern(1);
        });
    </script>
