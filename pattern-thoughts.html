<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Thoughts — MetaVoxa House</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/pattern-thoughts.css">
</head>
<body class="pattern-room">
    <nav class="room-nav">
        <a href="index.html" class="back-link">← Lobby</a>
        <div class="day-indicator">Day <span id="current-day-number">001</span> of 365</div>
    </nav>

    <main class="calendar-container">
        <div class="flip-calendar" id="flip-calendar">
            <div class="calendar-page current-page" id="current-page">
                <div class="page-header">
                    <span class="pattern-number" id="pattern-num">001</span>
                    <span class="year">2026</span>
                </div>
                <div class="page-content">
                    <h1 class="thought-title" id="thought-title">Loading...</h1>
                    <p class="thought-body" id="thought-body"></p>
                    <div class="deeper-layer">
                        <span class="layer-label">Deeper Layer</span>
                        <p id="deeper-text"></p>
                    </div>
                </div>
                <div class="page-corner"></div>
            </div>
            
            <div class="ghost-connections" id="ghost-connections">
                <!-- Faint lines to connected thoughts appear here -->
            </div>
        </div>

        <div class="thought-actions">
            <button class="action-btn" id="expand-substack" style="display: none;">
                Expand Thought on Substack →
            </button>
            <button class="action-btn secondary" onclick="toggleArchive()">
                View Archive
            </button>
        </div>

        <div class="discussion-area" id="discussion-area">
            <h3>Today's Debate</h3>
            <div class="comment-policy">
                <p>💡 Only today's active thought accepts new replies. Past thoughts remain readable.</p>
            </div>
            
            <!-- Giscus Container (for non-Substack thoughts) -->
            <div class="giscus-container" id="giscus-container"></div>
            
            <!-- Substack Embed Container (for expanded thoughts) -->
            <div class="substack-embed" id="substack-embed" style="display: none;">
                <iframe src="" width="100%" height="300" style="border:0;" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>
    </main>

    <div class="archive-modal" id="archive-modal">
        <div class="archive-content">
            <button class="close-archive" onclick="toggleArchive()">×</button>
            <h2>Pattern Archive</h2>
            <div class="archive-grid" id="archive-grid">
                <!-- Past thoughts render here as detached pages -->
            </div>
        </div>
    </div>

    <script src="js/data/thoughts.js"></script>
    <script src="js/pattern-thoughts.js"></script>
    <!-- Giscus Script (load conditionally) -->
    <script src="https://giscus.app/client.js"
        data-repo="YOUR_USERNAME/metavoxa-house"
        data-repo-id="YOUR_REPO_ID"
        data-category="Pattern Thoughts"
        data-category-id="YOUR_CATEGORY_ID"
        data-mapping="specific"
        data-term="pattern-thought-001"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="light"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
    </script>
</body>
</html>
